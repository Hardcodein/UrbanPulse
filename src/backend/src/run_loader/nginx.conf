worker_processes auto;

events {
    worker_connections 4096;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Сжатие — тайлы уже бинарные, сжимаем только текст
    gzip on;
    gzip_types text/plain application/json application/javascript text/css;

    # Логи
    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log warn;

    # Кэширование тайлов на стороне nginx (доп. уровень поверх C# кэша)
    proxy_cache_path /tmp/nginx_tile_cache
        levels=1:2
        keys_zone=tiles_cache:10m
        max_size=1g
        inactive=1h
        use_temp_path=off;

    server {
        listen 80;
        server_name localhost;

        # ── Векторные тайлы → TileService (C#) ──────────────────────────
        location /tiles/ {
            proxy_pass         http://tile_service:8080;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;

            # Кэш на стороне nginx — 1 час
            proxy_cache        tiles_cache;
            proxy_cache_valid  200 204 1h;
            proxy_cache_use_stale error timeout updating;
            add_header         X-Cache-Status $upstream_cache_status;

            # CORS для Mapbox GL
            add_header Access-Control-Allow-Origin *;
            add_header Content-Type application/x-protobuf;
        }

        # ── Health check TileService ──────────────────────────────────────
        location /tiles/health {
            proxy_pass http://tile_service:8080/health;
        }

        # ── REST API → ApiService (C#) ────────────────────────────────────
        location /api/ {
            proxy_pass         http://api_service:8080;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            add_header         Access-Control-Allow-Origin *;
        }

        # ── Health check ApiService ───────────────────────────────────────
        location /api/health {
            proxy_pass http://api_service:8080/health;
        }

        # ── DEM рельеф (растровые тайлы, статика) ─────────────────────────
        location /tiles/relief/ {
            alias  /data/tiles/relief/;
            expires 7d;
            add_header Cache-Control "public";
        }

        # ── Фронтенд (Next.js static export) ─────────────────────────────
        location / {
            root      /usr/share/nginx/html;
            try_files $uri $uri/ /index.html;
            expires   1h;
        }
    }
}
