version: '3.8'

services:
  urban_pulse_maps_database:
    container_name: urban_pulse_maps_database
    image: maps_to_database:latest
    build: ../maps_to_database
    volumes:
      - maps_to_database_volume:/var/lib/postgresql/data
    env_file: .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    networks:
      - isolated_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 15
    ports:
      - "65432:5432"

  urban_pulse_loader:
    container_name: urban_pulse_loader
    image: urban_pulse/loader:latest
    build:
      context: ../Loader
    env_file: .env
    environment:
      OSM_DIR: ${OSM_DIR}
      CITIES: ${CITIES}
      IMPOSM_PROTO: ${IMPOSM_PROTO}
      PSYCOPG2_PROTO: ${PSYCOPG2_PROTO}
      DATABASE_URL: ${DATABASE_URL}
      NAVIGATION_URL: ${NAVIGATION_URL}
    volumes:
      - ./data:/data
    networks:
      - isolated_network
    depends_on:
      urban_pulse_maps_database:
        condition: service_healthy

  tile_service:
    container_name: urban_pulse_tile_service
    build:
      context: ../services/TIleService
      dockerfile: Dockerfile
    env_file: .env
    environment:
      ConnectionStrings__Db: ${TILE_DB_CONNECTION}
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT}
      ASPNETCORE_URLS: ${ASPNETCORE_URLS}
    networks:
      - isolated_network
    depends_on:
      urban_pulse_maps_database:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  nginx:
    container_name: urban_pulse_nginx
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - isolated_network
    depends_on:
      - tile_service
    restart: unless-stopped

  valhalla:
    image: ghcr.io/nilsnolde/docker-valhalla/valhalla:latest
    container_name: urban_pulse_navigation
    ports:
      - 8002:8002
    volumes:
      - ./custom_files/:/custom_files
    networks:
      - isolated_network
    environment:
      - server_threads=2
      - serve_tiles=True
      - use_tiles_ignore_pbf=True
      - tileset_name=valhalla_tiles
      - build_elevation=False
      - build_admins=False
      - build_time_zones=False
      - build_transit=False
      - build_tar=True
      - force_rebuild=False
      - update_existing_config=True

volumes:
  maps_to_database_volume:

networks:
  isolated_network:
